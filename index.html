<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İnteraktif Periyodik Sistem ve Dinamik Orbital Dizilimi</title>
    <style>
        :root {
            --bg: #080c10; --panel: #0d1117; --border: #1c2a3a; --text: #c8d8e8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
        }
        
        #header-area { flex-shrink: 0; padding: 5px 10px; }

        #app-container { 
            flex: 1; display: flex; flex-direction: column; 
            padding: 5px; gap: 2px; justify-content: flex-start;
            overflow: hidden;
        }

        #main-grid, #f-grid { display: grid; gap: 1px; justify-content: center; }
        .el { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.05); position: relative; 
            transition: transform 0.1s;
        }
        .el:hover { transform: scale(1.1); z-index: 10; border-color: #fff; }
        .el.active { border: 2px solid #fff !important; box-shadow: 0 0 8px #fff; z-index: 11; }
        .el-no { font-size: 0.35em; position: absolute; top: 1px; left: 1px; opacity: 0.9; }
        .el-sym { font-size: 0.75em; font-weight: bold; color: #fff; }
        .lbl { font-size: 0.35em; color: #556677; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; }

        #panel { 
            background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
            padding: 8px; margin-top: 5px; display: flex; flex-direction: column; align-items: center;
            flex-shrink: 0; width: 100%;
        }
        #detay { display: flex; gap: 8px; margin-bottom: 8px; font-size: 0.8rem; flex-wrap: wrap; justify-content: center; }
        .box { background: rgba(255,255,255,0.03); padding: 4px 10px; border-left: 3px solid #555; border-radius: 4px; color: #4fc3f7; font-weight: bold; }

        #orb-root { width: 100%; display: flex; flex-direction: column; gap: 4px; align-items: center; }
        .orb-row { display: flex; justify-content: center; gap: 8px; width: 100%; flex-wrap: nowrap; }
        .orb-group { display: flex; gap: 1px; align-items: center; background: rgba(0,0,0,0.2); padding: 2px 4px; border-radius: 4px; }
        .orb-label { font-size: 11px; color: #ffa726; font-weight: bold; min-width: 25px; text-align: center; }
        
        .orb-box { 
            width: 18px; height: 18px; border: 1px solid #37474f; background: #05080a; 
            display: flex; align-items: center; justify-content: center; font-size: 12px; 
            color: #4fc3f7; border-radius: 2px;
        }
        .b-s { border-color: #fb8c00; } .b-p { border-color: #8e24aa; } .b-d { border-color: #546e7a; } .b-f { border-color: #43a047; }
        
        #tooltip { position: fixed; pointer-events: none; opacity: 0; background: #000; color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 12px; z-index: 1000; border: 1px solid #444; }
    </style>
</head>

        const classic = ["1A","2A","3B","4B","5B","6B","7B","8B","8B","8B","1B","2B","3A","4A","5A","6A","7A","8A"];
        
        /* ÖNERDİĞİNİZ YENİ VE OPTİMİZE EDİLMİŞ GRUPLAMA */
        const orbGroups = [
            ["1s", "2s", "2p"],             // Satır 1
            ["3s", "3p"],                   // Satır 2
            ["4s", "3d", "4p"],             // Satır 3
            ["5s", "4d", "5p"],             // Satır 4
            ["6s", "4f"],                   // Satır 5
            ["5d", "6p"],                   // Satır 6
            ["7s", "5f", "6d"],           //Satır 7
            ["7p"]        // Satır 8
        ];

        const orbCaps = { s: 1, p: 3, d: 5, f: 7 };

        function init() {
            const main = document.getElementById('main-grid');
            const fgrid = document.getElementById('f-grid');
            
            for(let i=1; i<=18; i++) {
                const d = document.createElement('div'); d.className='lbl'; 
                d.style.gridColumn=i+1; d.style.gridRow=1; d.innerHTML=i+"<br>"+classic[i-1]; main.appendChild(d);
            }
            for(let i=1; i<=8; i++) {
                const d = document.createElement('div'); d.className='lbl';
                d.style.gridColumn=1; d.style.gridRow=i+1; d.innerText=i; main.appendChild(d);
            }

            elements.forEach(e => {
                const d = document.createElement('div'); d.className='el';
                d.style.backgroundColor = colors[e[9]];
                if(e[6] < 8) { 
                    d.style.gridRow=e[6]+1;
                    d.style.gridColumn=e[7]+1;
                    main.appendChild(d);
                } else { 
                   d.style.gridRow=e[6]-7; 
                   d.style.gridColumn=e[7]-2; 
                   fgrid.appendChild(d); 
                }
                d.innerHTML = `<span class="el-no">${e[0]}</span><span class="el-sym">${e[1]}</span>`;
                d.onclick = () => update(e, d, colors[e[9]]);
                d.onmouseenter = () => { 
                    const tt = document.getElementById('tooltip');
                    tt.innerText = e[2]; tt.style.opacity = 1;
                };
                d.onmousemove = (ev) => {
                    const tt = document.getElementById('tooltip');
                    tt.style.left = (ev.clientX+10)+'px'; tt.style.top = (ev.clientY+10)+'px';
                };
                d.onmouseleave = () => document.getElementById('tooltip').style.opacity = 0;
            });
            resizer();
        }

        function update(data, el, color) {
            document.querySelectorAll('.el').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('d-name').innerText = "Element: " + data[2];
            document.getElementById('d-no').innerText = "Atom No: " + data[0];
            document.getElementById('d-no').style.borderLeftColor = color;
            document.getElementById('d-ag').innerText = "Kütle: " + data[3];
            document.getElementById('d-per').innerText = "Periyot: " + data[5];
            const cls = classic[data[4]-1] || (data[0] >= 57 && data[0] <= 71 ? "Lantanit" : "Aktinit");
            document.getElementById('d-grp').innerText = `Grup: ${data[4]} (${cls})`;
            renderOrbitalsDinamik(data[0]);
        }

        function renderOrbitalsDinamik(atomNo) {
            const root = document.getElementById('orb-root');
            root.innerHTML = '';
            let rem = atomNo;

            orbGroups.forEach(group => {
                if (rem <= 0) return;
                const rowDiv = document.createElement('div');
                rowDiv.className = 'orb-row';
                let rowHasContent = false;

                group.forEach(orbName => {
                    if (rem <= 0) return;
                    const type = orbName.slice(-1);
                    const boxes = orbCaps[type];
                    let elec;

                    if (exceptions[atomNo] && exceptions[atomNo][orbName] !== undefined) {
                        elec = exceptions[atomNo][orbName];
                    } else {
                        elec = Math.min(rem, boxes * 2);
                    }

                    if (elec > 0 || atomNo >= getMinNoForOrb(orbName)) {
                        rowHasContent = true;
                        const grpDiv = document.createElement('div');
                        grpDiv.className = 'orb-group';
                        grpDiv.innerHTML = `<div class="orb-label">${orbName}</div>`;

                        for (let i = 0; i < boxes; i++) {
                            const box = document.createElement('div');
                            box.className = `orb-box b-${type}`;
                            let arrow = "";
                            if (elec > boxes + i) arrow = "⇅";
                            else if (elec > i) arrow = "↑";
                            box.innerText = arrow;
                            grpDiv.appendChild(box);
                        }
                        rowDiv.appendChild(grpDiv);
                        rem -= elec; 
                    }
                });
                if (rowHasContent) root.appendChild(rowDiv);
            });
        }

        function getMinNoForOrb(name) {
            const sequence = ["1s","2s","2p","3s","3p","4s","3d","4p","5s","4d","5p","6s","4f","5d","6p","7s","5f","6d","7p"];
            const caps = {s:2, p:6, d:10, f:14};
            let sum = 0;
            for(let n of sequence) {
                if(n === name) return sum + 1;
                sum += caps[n.slice(-1)];
            }
            return 0;
        }

        function resizer() {
            const availableH = window.innerHeight - document.getElementById('header-area').offsetHeight - 20;
            const availableW = window.innerWidth - 20;
            
            const cellW = Math.floor(availableW / 19.5);
            const cellH = Math.floor(availableH / 14);
            const cellSize = Math.min(cellW, cellH, 35); 

            document.querySelectorAll('.el, .lbl').forEach(e => {
                e.style.width = cellSize + 'px'; e.style.height = cellSize + 'px';
            });
            document.getElementById('main-grid').style.gridTemplateColumns = `repeat(19, ${cellSize}px)`;
            document.getElementById('f-grid').style.gridTemplateColumns = `repeat(15, ${cellSize}px)`;
            document.getElementById('f-grid').style.marginLeft = (cellSize * 3) + 'px';
        }

        window.onresize = resizer;
        window.onload = init;
    </script>
</body>
</html>
